<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#4338CA"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="doc1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#A5B4FC"/>
    </linearGradient>
    <linearGradient id="doc2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C7D2FE"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <!-- Drop shadow for front doc -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#0F0A3E" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Back document (target file) — simple rectangle, no fold -->
  <rect x="50" y="24" width="60" height="74" rx="4" fill="url(#doc2)" opacity="0.8"/>
  <!-- Lines on back doc -->
  <rect x="58" y="48" width="30" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>
  <rect x="58" y="56" width="22" height="3" rx="1.5" fill="#4338CA" opacity="0.25"/>
  <rect x="58" y="64" width="34" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>
  <rect x="58" y="72" width="18" height="3" rx="1.5" fill="#4338CA" opacity="0.25"/>
  <rect x="58" y="80" width="26" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>

  <!-- Front document (source config) -->
  <rect x="16" y="34" width="56" height="70" rx="4" fill="url(#doc1)" filter="url(#shadow)"/>
  <!-- YAML-like content -->
  <rect x="24" y="46" width="18" height="3" rx="1.5" fill="#4338CA" opacity="0.5"/>
  <rect x="28" y="54" width="30" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>
  <rect x="28" y="62" width="24" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>
  <rect x="28" y="70" width="28" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>
  <rect x="28" y="78" width="20" height="3" rx="1.5" fill="#4338CA" opacity="0.35"/>
  <rect x="24" y="86" width="16" height="3" rx="1.5" fill="#4338CA" opacity="0.5"/>
  <!-- Highlighted line (the clicked reference) -->
  <rect x="26" y="60" width="30" height="8" rx="2" fill="#FBBF24" opacity="0.3"/>

  <!-- Navigation arrow as single unified shape: curved band + arrowhead -->
  <!-- Glow -->
  <path d="M58 64 C70 64, 74 46, 88 42" stroke="#FBBF24" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.1"/>
  <!-- Arrow body: curved band tapering into a sharp arrowhead -->
  <path d="
    M56 61
    C67 61, 72 47, 82 42
    L80 36
    L96 40
    L84 50
    L82 44
    C72 49, 67 67, 56 67
    Z
  " fill="url(#arrow)"/>

  <!-- Origin dot -->
  <circle cx="56" cy="64" r="3" fill="#F59E0B"/>
  <circle cx="56" cy="64" r="6" fill="#FBBF24" opacity="0.12"/>
</svg>
